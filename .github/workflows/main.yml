name: Build Zeh APK

on:
  workflow_dispatch: # Permite que você rode o robô manualmente apertando um botão

jobs:
  build_apk:
    runs-on: ubuntu-latest # O GitHub vai nos emprestar um PC com Linux

    steps:
      - name: 📥 Baixar o seu código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install flet requests

      - name: 🐦 Configurar Flutter (Motor do Flet)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 🚀 Construir o APK
        run: flet build apk

      - name: 🎁 Salvar o APK final para Download
        uses: actions/upload-artifact@v4
        with:
          name: Zeh-Android-APK
          path: build/apk/*.apk
